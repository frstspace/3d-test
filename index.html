<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>3D test</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 3D Сцена -->
    <div id="game-container"></div>

    <!-- HUD (интерфейс) -->
    <div id="hud">
        <div id="score-text">ok: <span id="score-value">0</span></div>
        <div id="health-bar-container">
            <div id="health-label">HP</div>
            <div id="health-bar"><div id="health-fill"></div></div>
        </div>
        <div id="ammo-text">ПАТРОНЫ: <span id="ammo-value">30</span></div>
        <div id="wave-text">ВОЛНА: <span id="wave-value">1</span></div>
    </div>

    <!-- Прицел -->
    <div id="crosshair">✚</div>

    <!-- Зоны джойстиков (для мобильных) -->
    <div id="joystick-left-zone" class="joystick-zone"></div>
    <div id="joystick-right-zone" class="joystick-zone"></div>

    <!-- Кнопка стрельбы (для мобильных) -->
    <button id="fire-btn">🔫</button>

    <!-- Экран Game Over -->
    <div id="game-over" class="hidden">
        <h1>ИГРА ОКОНЧЕНА</h1>
        <p>Счёт: <span id="final-score">0</span></p>
        <p>Волна: <span id="final-wave">1</span></p>
        <button id="restart-btn">ИГРАТЬ СНОВА</button>
    </div>

    <!-- Экран старта -->
    <div id="start-screen">
        <h1>3D SHOOTER</h1>
        <p>Уничтожай врагов в трёхмерном мире!</p>
        <button id="start-btn">НАЧАТЬ ИГРУ</button>
        <div id="controls-info">
            <p>🎮 Управление:</p>
            <p>🕹 Левый джойстик — движение</p>
            <p>👆 Правый джойстик — прицел</p>
            <p>🔫 Красная кнопка — выстрел</p>
            <p>⌨️ WASD + Пробел (ПК)</p>
        </div>
    </div>

    <!-- Загрузка скриптов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
